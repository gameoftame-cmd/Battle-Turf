<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OVERRIDE // BATTLE ARENA</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #030305;
            --cyan: #00f3ff;
            --magenta: #ff0055;
            --dark-panel: rgba(10, 15, 20, 0.85);
        }

        body {
            margin: 0; padding: 0; background-color: var(--bg); color: #fff;
            font-family: 'Share Tech Mono', monospace; height: 100vh; overflow: hidden;
            background-image: 
                linear-gradient(rgba(0, 243, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            display: flex; flex-direction: column;
        }

        h1, h2, h3 { font-family: 'Orbitron', sans-serif; margin: 0; }

        /* The Arena Layout */
        .arena { flex: 1; position: relative; padding: 20px; display: flex; flex-direction: column; justify-content: space-between; }

        /* HUD Elements */
        .hud-box {
            background: var(--dark-panel); border: 1px solid #333; padding: 15px;
            border-radius: 4px; position: relative; width: 350px; backdrop-filter: blur(5px);
        }
        
        .enemy-hud { align-self: flex-end; border-color: rgba(255, 0, 85, 0.4); box-shadow: -5px 5px 20px rgba(255,0,85,0.1); margin-top: 20px; }
        .player-hud { align-self: flex-start; border-color: rgba(0, 243, 255, 0.4); box-shadow: 5px -5px 20px rgba(0,243,255,0.1); margin-bottom: 20px; }

        .entity-name { font-size: 1.2rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px; }
        .enemy-hud .entity-name { color: var(--magenta); text-shadow: 0 0 8px var(--magenta); }
        .player-hud .entity-name { color: var(--cyan); text-shadow: 0 0 8px var(--cyan); }

        .hp-bar-bg { width: 100%; height: 12px; background: #111; border: 1px solid #444; margin-top: 8px; position: relative; }
        .hp-bar-fill { height: 100%; width: 100%; transition: width 0.3s ease-out; }
        .enemy-hud .hp-bar-fill { background: linear-gradient(90deg, #800, var(--magenta)); width: 100%; }
        .player-hud .hp-bar-fill { background: linear-gradient(90deg, #004455, var(--cyan)); width: 100%; }

        .hp-text { position: absolute; right: 0; top: -20px; font-size: 0.9rem; color: #aaa; }

        /* Hologram Entities */
        .hologram-container { position: absolute; width: 100%; height: 100%; top: 0; left: 0; pointer-events: none; }
        
        .holo { position: absolute; width: 150px; height: 150px; display: flex; justify-content: center; align-items: center; }
        
        /* Enemy Hologram */
        .holo.enemy { top: 15%; right: 15%; animation: float 4s ease-in-out infinite; }
        .holo-shape-enemy {
            width: 100px; height: 100px; background: transparent; border: 2px solid var(--magenta);
            transform: rotate(45deg); box-shadow: inset 0 0 20px var(--magenta), 0 0 30px var(--magenta);
            animation: pulse-red 2s infinite alternate;
        }

        /* Player Hologram */
        .holo.player { bottom: 25%; left: 15%; animation: float 5s ease-in-out infinite reverse; }
        .holo-shape-player {
            width: 120px; height: 120px; border-radius: 50%; border: 2px dashed var(--cyan);
            box-shadow: inset 0 0 20px var(--cyan), 0 0 30px rgba(0, 243, 255, 0.4);
            animation: spin 10s linear infinite; display: flex; justify-content: center; align-items: center;
        }
        .holo-shape-player::after { content: ''; width: 60px; height: 60px; border: 2px solid var(--cyan); transform: rotate(45deg); }

        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-20px); } 100% { transform: translateY(0px); } }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes pulse-red { 0% { opacity: 0.7; transform: rotate(45deg) scale(0.9); } 100% { opacity: 1; transform: rotate(45deg) scale(1.1); } }

        /* Command Terminal */
        .command-terminal {
            background: rgba(5, 5, 8, 0.95); border-top: 1px solid var(--cyan); height: 250px;
            display: flex; box-shadow: 0 -10px 30px rgba(0, 243, 255, 0.1); z-index: 10;
        }

        .combat-log {
            flex: 1; padding: 20px; border-right: 1px solid #333; overflow-y: auto; color: #888;
            display: flex; flex-direction: column; gap: 5px;
        }
        .log-entry { margin-bottom: 5px; }
        .log-entry.system { color: #ffaa00; }
        .log-entry.damage { color: var(--magenta); }

        .action-grid {
            flex: 1; display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr;
            gap: 10px; padding: 20px;
        }

        .btn-action {
            background: transparent; border: 1px solid #444; color: #fff; font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem; text-transform: uppercase; cursor: pointer; transition: 0.2s; position: relative;
            overflow: hidden;
        }
        .btn-action:hover { border-color: var(--cyan); background: rgba(0, 243, 255, 0.1); box-shadow: 0 0 15px rgba(0, 243, 255, 0.3); }
        .btn-action:active { transform: scale(0.98); }
        
        .btn-action.attack { color: var(--cyan); }
        .btn-action.special { color: var(--magenta); }

        /* Screen Glitch overlay */
        .scanlines {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 999;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.1) 50%, rgba(0,0,0,0.1));
            background-size: 100% 4px; opacity: 0.3;
        }
    </style>
</head>
<body>

    <div class="scanlines"></div>

    <div class="arena">
        
        <div class="hud-box enemy-hud">
            <div class="entity-name">MECHA_REX <span style="font-size: 0.8rem; color: #666;">[HOST]</span></div>
            <div class="hp-bar-bg">
                <div class="hp-bar-fill"></div>
                <div class="hp-text">3000 / 3000</div>
            </div>
        </div>

        <div class="hologram-container">
            <div class="holo enemy">
                <div class="holo-shape-enemy"></div>
            </div>
            <div class="holo player">
                <div class="holo-shape-player"></div>
            </div>
        </div>

        <div class="hud-box player-hud">
            <div class="entity-name">VOID_DRAGON <span style="font-size: 0.8rem; color: #666;">[LVL 14]</span></div>
            <div class="hp-bar-bg">
                <div class="hp-bar-fill"></div>
                <div class="hp-text">4200 / 4200</div>
            </div>
        </div>
    </div>

    <div class="command-terminal">
        <div class="combat-log">
            <div class="log-entry system">> UPLINK ESTABLISHED.</div>
            <div class="log-entry system">> HOST DETECTED: MECHA_REX.</div>
            <div class="log-entry">> Waiting for command input...</div>
        </div>
        <div class="action-grid">
            <button class="btn-action attack">[ HACK // STRIKE ]</button>
            <button class="btn-action special">[ OVERLOAD // EMP ]</button>
            <button class="btn-action">[ FIREWALL // DEFEND ]</button>
            <button class="btn-action" style="color: #ffaa00;">[ EXTRACT // FLEE ]</button>
        </div>
    </div>

    <script>
        // Game State
        const player = { name: "VOID_DRAGON", maxHp: 4200, hp: 4200, baseAttack: 450, isDefending: false };
        const enemy = { name: "MECHA_REX", maxHp: 3000, hp: 3000, baseAttack: 350 };
        let isPlayerTurn = true;
        let battleOver = false;

        // UI Elements
        const logBox = document.querySelector('.combat-log');
        const playerHpBar = document.querySelector('.player-hud .hp-bar-fill');
        const playerHpText = document.querySelector('.player-hud .hp-text');
        const enemyHpBar = document.querySelector('.enemy-hud .hp-bar-fill');
        const enemyHpText = document.querySelector('.enemy-hud .hp-text');
        const actionButtons = document.querySelectorAll('.btn-action');

        // Functions
        function writeLog(message, type = "") {
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.innerText = `> ${message}`;
            logBox.appendChild(entry);
            logBox.scrollTop = logBox.scrollHeight;
        }

        function updateUI() {
            const pPercent = Math.max(0, (player.hp / player.maxHp) * 100);
            const ePercent = Math.max(0, (enemy.hp / enemy.maxHp) * 100);
            playerHpBar.style.width = pPercent + '%';
            playerHpText.innerText = `${Math.floor(player.hp)} / ${player.maxHp}`;
            enemyHpBar.style.width = ePercent + '%';
            enemyHpText.innerText = `${Math.floor(enemy.hp)} / ${enemy.maxHp}`;
        }

        function calculateDamage(baseDmg, isTargetDefending) {
            const variance = 0.85 + (Math.random() * 0.3);
            let finalDmg = baseDmg * variance;
            if (isTargetDefending) finalDmg *= 0.5;
            const isCrit = Math.random() < 0.1;
            if (isCrit) finalDmg *= 1.5;
            return { damage: Math.floor(finalDmg), isCrit };
        }

        function checkWinCondition() {
            if (player.hp <= 0) {
                writeLog("CRITICAL FAILURE. CONNECTION LOST.", "damage");
                battleOver = true;
                disableButtons();
                return true;
            }
            if (enemy.hp <= 0) {
                writeLog("HOST DEFEATED. EXTRACTING DATA CORE...", "system");
                battleOver = true;
                disableButtons();
                return true;
            }
            return false;
        }

        function disableButtons(disable = true) {
            actionButtons.forEach(btn => {
                btn.style.opacity = disable ? "0.3" : "1";
                btn.style.pointerEvents = disable ? "none" : "auto";
            });
        }

        function enemyTurn() {
            if (battleOver) return;
            writeLog(`${enemy.name} is calculating counter-measure...`);
            setTimeout(() => {
                const hit = calculateDamage(enemy.baseAttack, player.isDefending);
                player.hp -= hit.damage;
                let msg = `${enemy.name} fires plasma cannon for ${hit.damage} DMG!`;
                if (hit.isCrit) msg = `CRITICAL ALERT! ` + msg;
                if (player.isDefending) msg += ` (Deflected)`;
                writeLog(msg, "damage");
                
                document.body.style.transform = "translate(5px, 5px)";
                setTimeout(() => document.body.style.transform = "none", 100);

                updateUI();
                player.isDefending = false;

                if (!checkWinCondition()) {
                    isPlayerTurn = true;
                    disableButtons(false);
                    writeLog("Awaiting your command...");
                }
            }, 1500);
        }

        function executeAction(actionType) {
            if (!isPlayerTurn || battleOver) return;
            isPlayerTurn = false;
            disableButtons(true);

            if (actionType === 'attack') {
                const hit = calculateDamage(player.baseAttack, false);
                enemy.hp -= hit.damage;
                let msg = `You executed [STRIKE] for ${hit.damage} DMG.`;
                if (hit.isCrit) msg = `CRITICAL HIT! ` + msg;
                writeLog(msg, "system");
            } else if (actionType === 'special') {
                if (Math.random() > 0.3) {
                    const hit = calculateDamage(player.baseAttack * 2, false);
                    enemy.hp -= hit.damage;
                    writeLog(`[EMP OVERLOAD] successful! Massive ${hit.damage} DMG.`, "system");
                } else {
                    writeLog(`[EMP OVERLOAD] failed to connect. Target evaded.`, "damage");
                }
            } else if (actionType === 'defend') {
                player.isDefending = true;
                writeLog(`[FIREWALL] deployed. Incoming damage reduced for next turn.`, "system");
            }

            updateUI();
            if (!checkWinCondition()) enemyTurn();
        }

        // Event Listeners
        actionButtons[0].onclick = () => executeAction('attack');
        actionButtons[1].onclick = () => executeAction('special');
        actionButtons[2].onclick = () => executeAction('defend');
        actionButtons[3].onclick = () => {
            if (battleOver) return;
            writeLog("Forced disconnection. Coward.", "damage");
            battleOver = true;
            disableButtons();
        };

        // Boot up
        updateUI();
    </script>
</body>
</html>
